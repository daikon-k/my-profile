<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脂肪</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-500 min-h-screen flex items-center justify-center">

    <main class="w-auto flex flex-col md:flex-row justify-center gap-8 p-8">
        <div class="flex w-full flex-1 flex-col gap-6 rounded-2xl bg-gray-400 p-6 shadow-2xl md:flex-row md:items-stretch">

            <div class="flex flex-1 flex-col items-center justify-center rounded-xl p-8 space-y-3">
                <h1 class="text-gray-900 text-4xl font-bold text-center mx-auto">計算</h1>

                <label class="text-center text-2xl">身長</label>
                <input id="height" type="number" placeholder="例：150cm" class="w-56 rounded bg-white px-3 py-2">

                <label class="text-2xl">体重</label>
                <input id="weight" type="number" placeholder="例：50kg" class="w-56 rounded bg-white px-3 py-2">

                <button id="calcBtn" class="w-60 bg-blue-600 text-white font-bold py-2 rounded hover:bg-red-900 transition">計算する</button>

            </div>
        </div>

        <div class="flex w-full flex-1 flex-col gap-6 rounded-2xl bg-gray-400 p-6 shadow-2xl md:flex-row md:items-stretch">

            <div class="flex flex-1 flex-col items-center justify-center rounded-xl p-8 space-y-3">
                <h1 class="text-gray-900 text-4xl font-bold text-center">計算結果</h1>

                <p id="result" class="mt-6 text-center text-4xl font-bold text-gray-800"></p>

            </div>
        </div>
    </main>

    <script>
        function calcBmi(height,weight){
            const heightM = height / 100;
            return weight / (heightM * heightM);
        }

        function getJudgment(bmi) {
        if (bmi < 18.5) {
            return "痩せ型";
        } else if (bmi < 25) {
            return "普通";
        } else {
            return "肥満";
        }
        }

        const button = document.querySelector("#calcBtn");
        const result = document.querySelector("#result");

        function calc() {
        const height = Number(document.querySelector("#height").value);
        const weight = Number(document.querySelector("#weight").value);

        if (height <= 0 || weight <= 0) {
            result.textContent = "身長と体重を正しく入力してから計算してください";
            result.classList.remove("text-blue-600", "text-green-600", "text-red-600");
            result.classList.add("text-gray-800");
            return;
        }

        const bmi = calcBmi(height, weight);
        const judgment = getJudgment(bmi);

        result.textContent = "BMI: " + bmi.toFixed(1) + "（" + judgment + "）";

        result.classList.remove("text-gray-800","text-blue-600", "text-green-600", "text-red-600");

        if (judgment === "痩せ型") {
            result.classList.add("text-blue-600");
        } else if (judgment === "普通") {
            result.classList.add("text-green-600");
        } else {
            result.classList.add("text-red-600");
        }
        }

        button.addEventListener("click", calc);

        document.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            calc();
        }

        });
    </script>

</body>
</html>
