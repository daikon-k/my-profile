<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介カード</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 py-8">
    <main class="max-w-6xl mx-auto px-6">
        <h1 class="text-4xl font-bold text-white mb-4 text-center">チームメンバー</h1>
        <div class="flex flex-col md:flex-row gap-6">
        <div class="bg-white rounded-lg shadow p-10 mb-6 flex-1">
                <span class="block text-center">
                    <img src="./img/ONN.jpg"alt="花江"class="w-24 h-24 mx-auto rounded-full object-cover"></span>
                <h2 class="text-gray-900 text-2xl mt-2 text-center">花江 薫</h2>
                <p class="text-gray-600 text-sm mt-2 font-bold">20歳、大手企業に就職したが、仕事があわず辞職。今は、主に海外を拠点にして、フリーターとして働いている。</p>
            </div>
        <div class="bg-white rounded-lg shadow p-10 mb-6 flex-1">
                <span class="block text-center">
                    <img src="./img/W2.jpg" alt="小杉" class="w-24 h-24 mx-auto rounded-full object-cover"></span>
                <h2 class="text-gray-900 text-2xl mt-2 text-center">小杉 永華</h2>
                <p class="text-gray-600 text-sm mt-2 font-bold">23歳、学生の時、親の転勤で海外で12年間過ごした経験から、現在は海外で貿易関係の仕事についている。</p>
            </div>
        <div class="bg-white rounded-lg shadow p-10 mb-6 flex-1">
                <span class="block text-center">
                    <img src="./img/M1.jpg" alt="山川" class="w-24 h-24 mx-auto rounded-full object-cover"></span>
                <h2 class="text-gray-900 text-2xl mt-2 text-center">山川 翔</h2>
                <p class="text-gray-600 text-sm mt-2 font-bold">35歳、大学1年生で起業するが一度挫折し、現在はその経験から起業し、取締役として成功している。</p>
            </div>
        </div>
    </main>
</body>
</html>
